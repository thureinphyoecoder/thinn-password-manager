<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Thinn Password Manager</title>
    <link rel="stylesheet" href="../styles/app.css" />
  </head>

  <body data-theme="system" data-screen="auth">
    <div class="app-frame">
      <!-- ================= HEADER (MAIN APP ONLY) ================= -->
      <header class="app-header">
        <!-- LEFT -->
        <div class="header-left">
          <svg
            class="brand-icon"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
          >
            <path
              d="M7 2L17 2L22 12L17 22L7 22L2 12Z"
              stroke="currentColor"
              stroke-width="1.8"
            />
            <circle cx="12" cy="12" r="2" fill="currentColor" />
          </svg>
          <span class="brand-text">Thinn Password Manager</span>
        </div>

        <!-- CENTER -->
        <div class="header-center">
          <input type="search" class="header-search" placeholder="Search" />
        </div>

        <!-- RIGHT -->
        <div class="header-right">
          <button id="add-item-btn" class="btn-primary btn-sm">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path
                d="M12 5v14M5 12h14"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
            <span>Add item</span>
          </button>

          <button
            id="lock-btn"
            class="icon-btn lock-btn"
            aria-label="Lock vault"
          >
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
              <rect
                x="5"
                y="11"
                width="14"
                height="10"
                rx="2"
                stroke="currentColor"
                stroke-width="2"
              />
              <path
                d="M8 11V8a4 4 0 0 1 8 0v3"
                stroke="currentColor"
                stroke-width="2"
              />
            </svg>
          </button>

          <!-- Avatar -->
          <div class="avatar-wrap">
            <button class="avatar-btn">
              <span class="avatar-circle">TR</span>
              <span class="avatar-caret">▾</span>
            </button>

            <!-- DROPDOWN -->
            <div class="avatar-menu" hidden>
              <button class="menu-item">Import vault</button>
              <button class="menu-item">Export vault</button>
            </div>
          </div>
        </div>
      </header>

      <!-- ================= CONTENT ================= -->
      <main class="app-content">
        <!-- ========== AUTH SCREENS ========== -->
        <section id="create-screen" class="auth-layout" hidden>
          <div class="auth-card">
            <!-- BRAND -->
            <div class="brand">
              <svg
                class="brand-icon"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
              >
                <path
                  d="M7 2L17 2L22 12L17 22L7 22L2 12Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                />
                <circle cx="12" cy="12" r="2" fill="currentColor" />
              </svg>
              <span>Thinn Password Manager</span>
            </div>

            <h2>Create Account</h2>

            <input id="create-username" type="text" placeholder="Username" />

            <div class="password-field">
              <input
                id="create-pw"
                type="password"
                placeholder="Master password"
              />
              <button
                class="eye-btn"
                data-target="create-pw"
                aria-label="Toggle password"
              >
                <svg viewBox="0 0 24 24" width="18" height="18">
                  <path
                    d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  />
                  <circle cx="12" cy="12" r="3" fill="currentColor" />
                </svg>
              </button>
            </div>

            <div class="password-strength">
              <div id="password-strength-bar"></div>
            </div>

            <div class="password-field">
              <input
                id="confirm-pw"
                type="password"
                placeholder="Confirm password"
              />
              <button
                class="eye-btn"
                data-target="confirm-pw"
                aria-label="Toggle password"
              >
                <svg viewBox="0 0 24 24" width="18" height="18">
                  <path
                    d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  />
                  <circle cx="12" cy="12" r="3" fill="currentColor" />
                </svg>
              </button>
            </div>

            <label class="ack">
              <input type="checkbox" id="ack-no-recovery" />
              <span>I understand that this password cannot be recovered.</span>
            </label>

            <button id="create-btn" class="btn-primary" disabled>Create</button>
            <p id="create-msg" class="error"></p>
          </div>
        </section>

        <section id="unlock-screen" class="auth-layout" hidden>
          <div class="auth-card">
            <h2>Unlock Vault</h2>

            <div class="password-field">
              <input
                id="unlock-pw"
                type="password"
                placeholder="Master password"
              />
              <button class="eye-btn" data-target="unlock-pw"></button>
            </div>

            <button id="unlock-btn" class="btn-primary">Unlock</button>
            <p id="unlock-msg" class="error"></p>
          </div>
        </section>

        <!-- ========== MAIN APP ========== -->
        <section id="home-screen" class="main-layout" hidden>
          <!-- SIDEBAR -->
          <aside class="sidebar">
            <div class="sidebar-top">
              <div class="sidebar-title">Categories</div>
              <button class="sidebar-item add-category">+ New Category</button>

              <div class="category-list"></div>
            </div>

            <!-- SIDEBAR FOOTER -->
            <div class="sidebar-footer">
              <button id="settings-btn" class="sidebar-footer-item">
                <!-- Gear / Settings icon -->
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="12" cy="12" r="3"></circle>
                  <path
                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06
                    a2 2 0 0 1 0 2.83
                    a2 2 0 0 1-2.83 0l-.06-.06
                    a1.65 1.65 0 0 0-1.82-.33
                    a1.65 1.65 0 0 0-1 1.51V21
                    a2 2 0 0 1-2 2
                    a2 2 0 0 1-2-2v-.09
                    a1.65 1.65 0 0 0-1-1.51
                    a1.65 1.65 0 0 0-1.82.33l-.06.06
                    a2 2 0 0 1-2.83 0
                    a2 2 0 0 1 0-2.83l.06-.06
                    a1.65 1.65 0 0 0 .33-1.82
                    a1.65 1.65 0 0 0-1.51-1H3
                    a2 2 0 0 1-2-2
                    a2 2 0 0 1 2-2h.09
                    a1.65 1.65 0 0 0 1.51-1
                    a1.65 1.65 0 0 0-.33-1.82l-.06-.06
                    a2 2 0 0 1 0-2.83
                    a2 2 0 0 1 2.83 0l.06.06
                    a1.65 1.65 0 0 0 1.82.33H9
                    a1.65 1.65 0 0 0 1-1.51V3
                    a2 2 0 0 1 2-2
                    a2 2 0 0 1 2 2v.09
                    a1.65 1.65 0 0 0 1 1.51
                    a1.65 1.65 0 0 0 1.82-.33l.06-.06
                    a2 2 0 0 1 2.83 0
                    a2 2 0 0 1 0 2.83l-.06.06
                    a1.65 1.65 0 0 0-.33 1.82V9
                    a1.65 1.65 0 0 0 1.51 1H21
                    a2 2 0 0 1 2 2
                    a2 2 0 0 1-2 2h-.09
                    a1.65 1.65 0 0 0-1.51 1z"
                  />
                </svg>

                <span>Settings</span>
              </button>
            </div>
          </aside>

          <!-- MAIN CONTENT -->
          <div class="main-container">
            <div class="home-body">
              <!-- ===== VAULT VIEW ===== -->
              <div id="vault-view">
                <div id="vault-empty" class="vault-empty">
                  <svg viewBox="0 0 24 24" width="32" height="32">
                    <path
                      d="M3 7h6l2 2h10v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.8"
                    />
                  </svg>
                  <h3>No items yet</h3>
                  <p>Your vault is empty.</p>
                </div>

                <div id="vault-list" hidden></div>
              </div>

              <!-- ===== SETTINGS VIEW ===== -->
              <div id="settings-view" hidden>
                <div class="settings-layout">
                  <!-- LEFT: SETTINGS SIDEBAR -->
                  <aside class="settings-sidebar">
                    <button
                      data-settings="security"
                      class="settings-nav-item active"
                    >
                      <svg
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                      >
                        <path
                          d="M12 3l7 4v5c0 5-3.5 9-7 10
                   -3.5-1-7-5-7-10V7l7-4z"
                        />
                      </svg>
                      <span>Security</span>
                    </button>

                    <button
                      data-settings="appearance"
                      class="settings-nav-item"
                    >
                      <svg
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                      >
                        <circle cx="12" cy="12" r="5" />
                        <path
                          d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42
                   M18.36 18.36l1.42 1.42
                   M1 12h2M21 12h2"
                        />
                      </svg>
                      <span>Appearance</span>
                    </button>

                    <button data-settings="about" class="settings-nav-item">
                      <svg
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                      >
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="16" x2="12" y2="12" />
                        <line x1="12" y1="8" x2="12.01" y2="8" />
                      </svg>
                      <span>About</span>
                    </button>
                  </aside>

                  <!-- RIGHT: SETTINGS CONTENT -->
                  <section class="settings-content">
                    <button id="settings-back-btn" class="settings-back-btn">
                      <svg viewBox="0 0 24 24" width="16" height="16">
                        <path
                          d="M15 18l-6-6 6-6"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="2"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        />
                      </svg>
                      <span>Back to Vault</span>
                    </button>

                    <!-- SECURITY -->
                    <div data-settings-panel="security">
                      <div class="settings-section auto-lock-section">
                        <h3>Auto-lock</h3>
                        <p class="muted">Lock vault after inactivity</p>

                        <div class="auto-lock-list">
                          <label class="auto-lock-item">
                            <input type="radio" name="autoLock" value="30000" />
                            <span class="dot"></span>
                            <span class="label">30 seconds</span>
                          </label>

                          <span class="auto-lock-line"></span>

                          <label class="auto-lock-item">
                            <input
                              type="radio"
                              name="autoLock"
                              value="60000"
                              checked
                            />
                            <span class="dot"></span>
                            <span class="label">1 minute</span>
                          </label>

                          <span class="auto-lock-line"></span>

                          <label class="auto-lock-item">
                            <input
                              type="radio"
                              name="autoLock"
                              value="120000"
                            />
                            <span class="dot"></span>
                            <span class="label">2 minutes</span>
                          </label>

                          <span class="auto-lock-line"></span>

                          <label class="auto-lock-item">
                            <input
                              type="radio"
                              name="autoLock"
                              value="180000"
                            />
                            <span class="dot"></span>
                            <span class="label">3 minutes</span>
                          </label>

                          <span class="auto-lock-line"></span>

                          <label class="auto-lock-item">
                            <input
                              type="radio"
                              name="autoLock"
                              value="300000"
                            />
                            <span class="dot"></span>
                            <span class="label">5 minutes</span>
                          </label>
                        </div>
                      </div>
                    </div>

                    <!-- ACCOUNT -->
                    <div class="settings-section account-section">
                      <h3 class="settings-title">
                        <svg width="16" height="16" viewBox="0 0 24 24">
                          <path
                            d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5
               -5 2.3-5 5 2.3 5 5 5z"
                          />
                          <path d="M4 22c0-4 4-7 8-7s8 3 8 7" />
                        </svg>
                        Account
                      </h3>

                      <!-- Username -->
                      <div class="account-row">
                        <input
                          id="update-username"
                          type="text"
                          placeholder="New username"
                        />
                        <button class="btn-primary btn-sm">Update</button>
                      </div>

                      <!-- Divider -->
                      <div class="account-divider"></div>

                      <!-- Password -->
                      <div class="account-danger">
                        <button class="btn-danger ghost btn-sm">
                          Change master password
                        </button>
                      </div>
                    </div>

                    <!-- APPEARANCE -->
                    <div data-settings-panel="appearance" hidden>
                      <h2>Appearance</h2>
                      <p class="muted">Theme switching coming soon.</p>
                    </div>

                    <!-- ABOUT -->
                    <div data-settings-panel="about" hidden>
                      <h2>About</h2>
                      <p>Thinn Password Manager</p>
                      <p class="muted">Version 1.0.0</p>
                    </div>
                  </section>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- ========== ADD ITEM MODAL ========== -->
        <div id="add-item-modal" class="add-item-modal" hidden>
          <div class="add-item-card">
            <div class="add-item-header">
              <h3>Add Item</h3>
            </div>

            <div class="add-item-body">
              <input id="item-site" placeholder="Website name" />
              <input id="item-url" placeholder="Website URL (optional)" />
              <input id="item-username" placeholder="Username" />

              <div class="password-field">
                <input
                  id="item-password"
                  type="password"
                  placeholder="Password"
                />
                <button class="eye-btn" data-target="item-password">
                  <!-- svg eye -->
                </button>
              </div>

              <textarea placeholder="Notes (optional)"></textarea>
            </div>

            <div class="add-item-footer">
              <button class="ghost-btn" data-action="close-add-item">
                Cancel
              </button>
              <button id="save-item-btn" class="btn-primary">Save</button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="../renderer/app.js"></script>
  </body>
</html>
