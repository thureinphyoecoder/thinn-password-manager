<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Thinn Password Manager</title>
    <link rel="stylesheet" href="../styles/app.css" />
</head>

<body>
    <header class="app-header">
        <div class="brand">
            <svg class="brand-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <!-- hexagon -->
                <path d="M7 2L17 2L22 12L17 22L7 22L2 12Z" stroke="currentColor" stroke-width="1.8" />
                <!-- center dot -->
                <circle cx="12" cy="12" r="2" fill="currentColor" />
            </svg>
    
            <span class="brand-text">Thinn Password Manager</span>
        </div>
    </header>


    <!-- CREATE -->
    <section id="create-screen" hidden>
        <h2>Create Account</h2>

        <div class="field">
            <input id="create-username" type="text" placeholder="Username" />
        </div>        

        <div class="password-field">
            <input id="create-pw" type="password" placeholder="Master password" />
            <button type="button" class="eye-btn" data-target="create-pw" aria-label="Toggle password visibility">
            </button>
        </div>

        <div class="password-strength">
            <div id="password-strength-bar"></div>
        </div>
        
        <div class="password-field">
            <input id="confirm-pw" type="password" placeholder="Confirm password" />
            <button type="button" class="eye-btn" data-target="confirm-pw" aria-label="Toggle password visibility">
                
            </button>
        </div>


        <label class="ack">
            <input type="checkbox" id="ack-no-recovery" />
            <span>
                I understand that this password cannot be recovered.
            </span>
        </label>

        <button id="create-btn" class="btn-primary" disabled>Create Account</button>
        <p id="create-msg"></p>


    </section>

    <!-- UNLOCK -->
    <section id="unlock-screen" hidden>
        <h2>Unlock Vault</h2>
    
        <input id="unlock-pw" type="password" placeholder="Master password" autocomplete="current-password" />
    
        <button id="unlock-btn" class="primary">
            Unlock
        </button>
    
        <p id="unlock-msg" class="error" hidden>
            Wrong password
        </p>
    </section>


    <!-- HOME -->
    <section id="home-screen" hidden>
        <button id="lock-btn">Lock</button>
        <button id="save-btn">Save</button>
        <button id="load-btn">Load</button>
        <pre id="out"></pre>
    </section>

    <!-- IMPORTANT -->
    <script type="module" src="../renderer/app.js"></script>
</body>

</html>
