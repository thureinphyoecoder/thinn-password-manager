<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Thinn Password Manager</title>
</head>

<body>
    <h1>🔐 Thinn Password Manager</h1>

    <input id="pw" type="password" placeholder="Master password" />
    <button id="save">Save</button>
    <button id="load">Load</button>

    <pre id="out"></pre>

    <script>
        const data = [
            { site: 'example.com', user: 'me', pass: '123' },
        ]

        save.onclick = async () => {
            await window.vault.save(pw.value, data)
            out.textContent = 'saved'
            pw.value = '' // clear password
        }

        load.onclick = async () => {
            try {
                const res = await window.vault.load(pw.value)
                out.textContent = JSON.stringify(res, null, 2)
            } catch {
                out.textContent = 'wrong password'
            } finally {
                pw.value = ''
            }
        }
    </script>
</body>

</html>
