<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Thinn Password Manager</title>
</head>

<body>
    <h1>🔐 Thinn Password Manager</h1>

    <input id="pw" type="password" placeholder="Master password" />
    <button id="save">Save</button>
    <button id="load">Load</button>

    <pre id="out"></pre>

    <script>
        const data = [
            { site: 'example.com', user: 'me', pass: '123' },
        ]

        save.onclick = async () => {
            await window.vault.save(pw.value, data)
            out.textContent = 'saved'
            pw.value = '' // clear password
        }

        load.onclick = async () => {
            try {
                const res = await window.vault.load(pw.value)
                out.textContent = JSON.stringify(res, null, 2)
            } catch {
                out.textContent = 'wrong password'
            } finally {
                pw.value = ''
            }
        }

        let attempts = 0
        const MAX_ATTEMPTS = 3

        const clearPassword = () => {
            pw.value = ''
        }

        save.onclick = async () => {
            if (!pw.value) return

            await window.vault.save(pw.value, data)
            clearPassword()
            out.textContent = 'saved'
                attempts = 0
            }

            load.onclick = async () => {
                if (!pw.value) return

                try {
                    const res = await window.vault.load(pw.value)
                    out.textContent = JSON.stringify(res, null, 2)
                    attempts = 0
                } catch {
                    attempts++
                    out.textContent = 'invalid credentials'
                } finally {
                    clearPassword()
                }

                if (attempts >= MAX_ATTEMPTS) {
                    out.textContent = 'temporarily locked'
                    save.disabled = true
                    load.disabled = true
                }
            }

        const markActivity = () => {
            if (window.vaultAPI) {
                window.vaultAPI.activity();
            }
        };

        ["mousemove", "keydown", "mousedown", "scroll", "touchstart"]
            .forEach(event =>
                window.addEventListener(event, markActivity)
            );
    </script>
</body>

</html>
